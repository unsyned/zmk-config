  #   artifact-name: cornetto_left
  # - board: nice_nano_v2
  #   shield: corne_right nice_view_adapter nice_view_gem
  #   artifact-name: cornetto_right
  # typeractive corne w stock display
  # - board: nice_nano_v2
  #   shield: corne_left nice_view_adapter nice_view
  # - board: nice_nano_v2
  #   shield: corne_right nice_view_adapter nice_view
  - board: nice_nano@2
    shield: settings_reset
    artifact-name: nice2_reset
